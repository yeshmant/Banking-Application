spring.application.name=Banking-Application

# PostgreSQL Database Config
spring.datasource.url=jdbc:postgresql://localhost:5432/bankdb
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:Post@2000}
spring.datasource.driver-class-name=org.postgresql.Driver
# JPA settings
# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
# log SQL queries
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

#after config
spring.jpa.generate-ddl=true
spring.main.allow-circular-references=true
server.error.include-message=always

# JWT
jwt.secret=${JWT_SECRET:your-secret-key-change-in-production}
# Token expiration time in milliseconds (e.g., 24 hours)
jwt.expiration=86400000
jwt.header=Authorization
jwt.prefix=Bearer

# Spring Mail
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Geolocation API
geo.api.url=${GEO_API_URL:https://api.findip.net/}
geo.api.key=${GEO_API_KEY:your-api-key}